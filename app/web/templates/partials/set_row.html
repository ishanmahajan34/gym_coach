<form
    class="set-row {% if s.actual_reps is not none %}is-done{% endif %}"
    hx-post="/workout/set/{{ s.id }}"
    hx-target="this"
    hx-swap="outerHTML"
    hx-trigger="change from:input"
>
    <span class="set-num">#{{ s.set_number }}</span>

    <input
        type="number"
        name="weight"
        step="5"
        inputmode="decimal"
        placeholder="{{ s.target_weight | int if s.target_weight else '—' }}"
        value="{{ s.actual_weight | int if s.actual_weight else '' }}"
        aria-label="weight (lb)"
    >

    <input
        type="number"
        name="reps"
        inputmode="numeric"
        placeholder="{{ s.target_reps if s.target_reps else '—' }}"
        value="{{ s.actual_reps if s.actual_reps else '' }}"
        aria-label="reps"
    >

    <span class="target-text">
        {% if s.target_weight and s.target_reps %}
            {{ s.target_weight | int }}&thinsp;×&thinsp;{{ s.target_reps }}
        {% elif s.target_reps %}
            —&thinsp;×&thinsp;{{ s.target_reps }}
        {% else %}
            —
        {% endif %}
    </span>
</form>
