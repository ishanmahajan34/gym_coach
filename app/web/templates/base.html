<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Coach{% endblock %}</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Coach">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">

    <!-- Fonts: Fraunces (display serif) + Inter Tight (body sans, less generic than Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>

    <link rel="stylesheet" href="/static/app.css">
    {% block head_extra %}{% endblock %}
</head>
<body class="bg-bg text-fg font-sans antialiased min-h-screen">
    <div class="max-w-2xl mx-auto px-5 py-6 pb-24">
        {% block content %}{% endblock %}
    </div>

    <!-- Bottom nav (mobile-first) -->
    <nav class="fixed bottom-0 inset-x-0 bg-bg-elev border-t border-border backdrop-blur-md">
        <div class="max-w-2xl mx-auto grid grid-cols-3 px-2">
            <a href="/" class="nav-link {% if active_nav == 'home' %}is-active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round" style="display:block;margin:0 auto 0.2rem">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span class="nav-label">Today</span>
            </a>
            <a href="/week" class="nav-link {% if active_nav == 'week' %}is-active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round" style="display:block;margin:0 auto 0.2rem">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                <span class="nav-label">Week</span>
            </a>
            <a href="/history" class="nav-link {% if active_nav == 'history' %}is-active{% endif %}">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round" style="display:block;margin:0 auto 0.2rem">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span class="nav-label">History</span>
            </a>
        </div>
    </nav>

    {% block body_extra %}{% endblock %}
</body>
</html>
