databases:
  - name: coach-db
    plan: free         # 90-day free tier — see TODO below
    databaseName: coach
    user: coach
    # TODO(backup): Before day 90, dump data with:
    #   pg_dump $DATABASE_URL > backup.sql
    # Then delete + recreate the DB on Render and restore:
    #   psql $NEW_DATABASE_URL < backup.sql
    # Render sends an expiry email at day 75 as a reminder.

services:
  - type: web
    name: gym-coach
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DB_URL
        fromDatabase:
          name: coach-db
          property: connectionString   # Render gives postgresql://...; app upgrades to asyncpg
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        value: https://gym-coach.onrender.com   # update after first deploy
      - key: DISABLE_BOT
        value: "true"
      - key: DISABLE_SCHEDULER
        value: "true"
      # Uncomment when bot is ready (M4):
      # - key: TELEGRAM_BOT_TOKEN
      #   sync: false
      # - key: TELEGRAM_CHAT_ID
      #   sync: false
      # - key: GEMINI_API_KEY
      #   sync: false
