app = 'gym-coach'
primary_region = 'sjc'

[build]

[env]
  DISABLE_BOT = "true"
  DISABLE_SCHEDULER = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "coach_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
